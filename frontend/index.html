function editQueueItem(id, prefill) {
  const item = state.current.cells['kinetic.engineer']?.queue?.find(i => i.id === id);
  if (!item) return;
  // Use prefill values if provided (restoring state after upstream dep workflow)
  const pDesc   = prefill?.desc   ?? item.description ?? '';
  const pAC     = prefill?.ac     ?? ((item.notes||'').match(/ac:([^|]+)/)?.[1]?.trim() ?? '');
  const pStatus = prefill?.status ?? item.status ?? 'pending';
  const pNotes  = prefill?.notes  ?? ((item.notes||'').replace(/ac:[^|]+/g,'').replace(/covers:[\d,]+/g,'').replace(/split_from:\d+/g,'').replace(/upstream_for:\d+/g,'').replace(/depends_on:\d+/g,'').replace(/order_num:\d+/g,'').replace(/declared:[\d,]+/g,'').replace(/has_upstream:\d+/g,'').replace(/promoted[_a-z]*/g,'').replace(/upstream_for:\d+/g,'').replace(/tags:[^|\n]+/g,'').replace(/\|/g,'').trim() ?? '');
  const existingTags = getTags(item).join(', ');
  const engDesired = state.current.cells['desired.engineer']?.queue || [];
  // Parse existing coverage from notes
  const coverageMatch = (item.notes||'').match(/covers:([\d,]+)/);
  const covered = coverageMatch ? coverageMatch[1].split(',').map(Number) : [];

  // Parse declared dependencies
  const declaredMatch = (item.notes||'').match(/declared:([\d,]+)/);
  const declaredDeps  = declaredMatch ? declaredMatch[1].split(',').map(Number) : [];

  const depSelectorHtml = engDesired.length ? `
    <div class="field">
      <label>Enables engineered states</label>
      <select id="dep-select" multiple onchange="previewDepHighlight(this)"
        style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:var(--sans);font-size:12px;padding:4px;outline:none;min-height:80px;max-height:120px">
        ${engDesired.map((ds, i) =>
          `<option value="${ds.id}" ${declaredDeps.includes(ds.id)?'selected':''}>${i+1}. ${esc(ds.description||'')}</option>`
        ).join('')}
      </select>
      <div style="font-size:11px;color:var(--muted);margin-top:4px">Hold Cmd/Ctrl to select multiple — selection previews highlights</div>
    </div>` : '';

  const coverageHtml = engDesired.length ? `
    <div class="field">
      <label>Enables engineered states (confirm at closure)</label>
      <select id="coverage-select" multiple
        style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:var(--sans);font-size:12px;padding:4px;outline:none;min-height:80px;max-height:120px">
        ${engDesired.map((ds, i) =>
          `<option value="${ds.id}" ${covered.includes(ds.id)?'selected':''}>${i+1}. ${esc(ds.description||'')}</option>`
        ).join('')}
      </select>
      <div style="font-size:11px;color:var(--muted);margin-top:4px">Hold Cmd/Ctrl to select multiple — selection previews highlights</div>
    </div>` : '';

  // Parse existing prerequisites (items that have upstream_for pointing to this item)
  const existingPrereqIds = (state.current.cells['kinetic.engineer']?.queue||[])
    .filter(wi => (wi.notes||'').includes(`upstream_for:${id}`))
    .map(wi => wi.id);

  // Other work items that could be prerequisites (not self)
  const otherItems = (state.current.cells['kinetic.engineer']?.queue||[]).filter(wi => wi.id !== id);

  const prereqSelectorHtml = otherItems.length ? `
    <div class="field">
      <label>Prerequisites (work items that must be true first)</label>
      <select id="prereq-select" multiple onchange="previewPrereqHighlight(this,${id})"
        style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:var(--sans);font-size:12px;padding:4px;outline:none;min-height:80px;max-height:120px">
        ${otherItems.map((wi, i) =>
          `<option value="${wi.id}" ${existingPrereqIds.includes(wi.id)?'selected':''}>${wi.order_num}. ${esc((wi.description||'').slice(0,60))}${(wi.description||'').length>60?'…':''}</option>`
        ).join('')}
      </select>
      <div style="font-size:11px;color:var(--muted);margin-top:4px">Hold Cmd/Ctrl to select multiple</div>
    </div>` : '';

  // Parse existing acceptance criterion from notes
  const acMatch = (item.notes||'').match(/ac:([^|]+)/);
  const existingAC = acMatch ? acMatch[1].trim() : '';

  openModal(`
    <h3>Edit Work Item</h3>
    <div class="field">
      <label>Description</label>
      <textarea id="edit-desc" rows="3">${esc(pDesc)}</textarea>
    </div>
    ${depSelectorHtml}
    ${prereqSelectorHtml}
    <div class="field">
      <label>Acceptance Criterion</label>
      <textarea id="edit-ac" rows="3" placeholder="How do you verify this state is true? One observable check.">${esc(pAC)}</textarea>
    </div>
    <div class="field">
      <label>Status</label>
      <select id="edit-status" onchange="onStatusChange(this)">
        ${['pending','active','closed','deferred','blocked'].map(s =>
          `<option value="${s}" ${pStatus===s?'selected':''}>${s}</option>`
        ).join('')}
      </select>
    </div>
    <div id="coverage-section" style="${item.status==='closed'?'':'display:none'}">
      ${coverageHtml}
    </div>
    <div class="field">
      <label>Notes</label>
      <input type="text" id="edit-notes" value="${esc(pNotes)}">
    </div>
    <div class="field">
      <label>Tags (comma-separated)</label>
      <input type="text" id="edit-tags" value="${esc(existingTags)}"
        placeholder="e.g. day-1, user-management, dns">
      ${getAllTags(state.current).length ? `<div style="margin-top:6px;display:flex;gap:4px;flex-wrap:wrap">
        ${getAllTags(state.current).map(t => `<span style="font-size:10px;font-family:var(--mono);background:rgba(168,85,247,.1);color:#c084fc;border-radius:3px;padding:1px 6px;cursor:pointer;border:1px solid rgba(168,85,247,.2)" onclick="addTagToInput('${esc(t)}')">${esc(t)}</span>`).join('')}
      </div>` : ''}
    </div>
    <div style="padding-top:16px;margin-top:8px;border-top:1px solid var(--border)">
      <div style="font-size:11px;color:var(--muted);margin-bottom:12px;line-height:1.7">
        <strong style="color:var(--warn)">Does this item need restructuring?</strong>
      </div>
      <div style="display:flex;flex-direction:column;gap:12px">
        <div style="background:rgba(200,121,65,.06);border:1px solid rgba(200,121,65,.2);border-radius:var(--r);padding:10px 12px">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
            <button class="btn-ghost btn-sm" style="border-color:rgba(200,121,65,.4);color:var(--warn);white-space:nowrap"
              onclick="promoteAndSplit(${id})">⬆ Promote &amp; Split</button>
            <span style="font-size:11px;font-family:var(--mono);color:var(--warn)">wrong level</span>
          </div>
          <div style="font-size:11px;color:var(--muted);line-height:1.7">
            <strong style="color:var(--text)">Signal:</strong> you cannot write a single acceptance criterion because this item is actually a category of work, not a condition.
            It belongs in Engineer Desired States. Move it up and enumerate its children as work items.
          </div>
        </div>
        <div style="background:rgba(91,141,238,.06);border:1px solid rgba(91,141,238,.2);border-radius:var(--r);padding:10px 12px">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
            <button class="btn-ghost btn-sm" style="border-color:rgba(91,141,238,.4);color:#7bb3e0;white-space:nowrap"
              onclick="addUpstreamDep(${id})">⬅ Add prerequisite</button>
            <span style="font-size:11px;font-family:var(--mono);color:#7bb3e0">missing prerequisite</span>
          </div>
          <div style="font-size:11px;color:var(--muted);line-height:1.7">
            <strong style="color:var(--text)">Signal:</strong> writing the acceptance criterion revealed a prerequisite — something this item <em>requires</em> that isn't in the queue yet.
            This item stays. The prerequisite gets inserted before it.
          </div>
        </div>
      </div>
    </div>
    <div class="btn-row mt16">
      <button class="btn-primary" onclick="saveQueueItem(${id})">Save</button>
      <button class="btn-ghost" onclick="closeModal()">Cancel</button>
    </div>
  `);
}

function onStatusChange(el) {
  const section = document.getElementById('coverage-section');
  if (section) section.style.display = el.value === 'closed' ? '' : 'none';
}

async function saveQueueItem(id) {
  const description = document.getElementById('edit-desc').value.trim();
  const status      = document.getElementById('edit-status').value;
  let notes         = document.getElementById('edit-notes').value.trim();

  // Collect declared dependencies from multi-select
  const depSelect = document.getElementById('dep-select');
  notes = notes.replace(/declared:[\d,]+/g, '').trim();
  if (depSelect) {
    const depIds = Array.from(depSelect.selectedOptions).map(o => o.value).join(',');
    if (depIds) notes = notes ? `${notes} declared:${depIds}` : `declared:${depIds}`;
  }

  // Save prerequisite relationships
  // Remove existing upstream_for tags pointing to this item from other items
  const prereqSelect = document.getElementById('prereq-select');
  if (prereqSelect) {
    const selectedPrereqIds = Array.from(prereqSelect.selectedOptions).map(o => parseInt(o.value));
    const allItems = state.current.cells['kinetic.engineer']?.queue || [];

    // For each item that was a prereq and is no longer selected, remove upstream_for tag
    const prevPrereqItems = allItems.filter(wi => (wi.notes||'').includes(`upstream_for:${id}`));
    for (const wi of prevPrereqItems) {
      if (!selectedPrereqIds.includes(wi.id)) {
        const cleanNotes = (wi.notes||'').replace(new RegExp(`upstream_for:${id}`, 'g'), '').trim();
        await api('PATCH', `/api/queue/${wi.id}`, {
          description: wi.description, status: wi.status, notes: cleanNotes
        });
      }
    }

    // For each newly selected prereq, add upstream_for tag
    for (const prereqId of selectedPrereqIds) {
      const wi = allItems.find(w => w.id === prereqId);
      if (wi && !(wi.notes||'').includes(`upstream_for:${id}`)) {
        const newNotes = (wi.notes||'').trim()
          ? `${wi.notes} upstream_for:${id}`
          : `upstream_for:${id}`;
        await api('PATCH', `/api/queue/${wi.id}`, {
          description: wi.description, status: wi.status, notes: newNotes
        });
      }
    }
  }

  // Collect acceptance criterion
  const ac = document.getElementById('edit-ac')?.value?.trim() || '';
  notes = notes.replace(/ac:[^|]+/g, '').trim();
  if (ac) notes = notes ? `${notes} | ac:${ac}` : `ac:${ac}`;

  // Collect coverage from multi-select
  const coverSel = document.getElementById('coverage-select');
  notes = notes.replace(/covers:[\d,]+/g, '').trim();
  if (coverSel) {
    const ids = Array.from(coverSel.selectedOptions).map(o => o.value).join(',');
    if (ids) notes = notes ? `${notes} covers:${ids}` : `covers:${ids}`;
  }

  // Save tags
  const tagsInput = document.getElementById('edit-tags')?.value?.trim() || '';
  notes = notes.replace(/tags:[^|\n]+/g, '').trim();
  if (tagsInput) {
    const cleanTags = tagsInput.split(',').map(t => t.trim()).filter(Boolean).join(',');
    if (cleanTags) notes = notes ? `${notes} | tags:${cleanTags}` : `tags:${cleanTags}`;
  }

  await api('PATCH', `/api/queue/${id}`, { description, status, notes });
  state.current = await api('GET', `/api/projects/${state.current.id}`);
  closeModal();
  renderProject();
  setTimeout(applyDepHighlight, 50);
}

async function deleteQueueItem(id) {
  if (!confirm('Remove this work item?')) return;
  await api('DELETE', `/api/queue/${id}`);
  state.current = await api('GET', `/api/projects/${state.current.id}`);
  renderProject();
}

// ── Projects ───────────────────────────────────────────────────────────────

function openNewProject() {
  openModal(`
    <h3>New Project</h3>
    <div class="field">
      <label>Name</label>
      <input type="text" id="new-name" placeholder="e.g. NHK M365 Migration">
    </div>
    <div class="field">
      <label>Description (optional)</label>
      <textarea id="new-desc" rows="2" placeholder="Brief context..."></textarea>
    </div>
    <div class="btn-row mt16">
      <button class="btn-primary" onclick="createProject()">Create</button>
      <button class="btn-ghost" onclick="closeModal()">Cancel</button>
    </div>
  `);
  setTimeout(() => document.getElementById('new-name')?.focus(), 50);
}

async function createProject() {
  const name = document.getElementById('new-name')?.value?.trim();
  const description = document.getElementById('new-desc')?.value?.trim();
  if (!name) return;
  const p = await api('POST', '/api/projects', { name, description });
  state.projects = await api('GET', '/api/projects');
  state.current = p;
  state.step = 0;
  closeModal();
  renderSidebar();
  renderProject();
}

async function deleteProject() {
  if (!state.current) return;
  if (!confirm(`Delete "${state.current.name}"? This cannot be undone.`)) return;
  await api('DELETE', `/api/projects/${state.current.id}`);
  state.projects = await api('GET', '/api/projects');
  state.current = null;
  renderSidebar();
  document.getElementById('view-empty').classList.remove('hidden');
  document.getElementById('view-project').classList.add('hidden');
  document.getElementById('export-bar').style.display = 'none';
}

// ── Export ─────────────────────────────────────────────────────────────────

async function exportJSON() {
  if (!state.current) return;
  const data = await api('GET', `/api/projects/${state.current.id}/export/json`);
  download(JSON.stringify(data, null, 2), `krm-${slug(state.current.name)}.json`, 'application/json');
}

async function exportMarkdown() {
  if (!state.current) return;
  const r = await fetch(`/api/projects/${state.current.id}/export/markdown`);
  const text = await r.text();
  download(text, `krm-${slug(state.current.name)}.md`, 'text/markdown');
}

function download(content, filename, type) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content], {type}));
  a.download = filename;
  a.click();
}

// ── Modal ──────────────────────────────────────────────────────────────────

function openModal(html) {
  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('modal').classList.remove('hidden');
}

function closeModal() {
  document.getElementById('modal').classList.add('hidden');
}

document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});

// ── Utils ──────────────────────────────────────────────────────────────────

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function slug(s) {
  return s.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
}

document.getElementById('ver').textContent = VERSION;
init();
</script>
